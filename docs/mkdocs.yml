site_name: agents-cli
site_description: Unified CLI for the full ADK agent development lifecycle
docs_dir: src
site_dir: ../site

theme:
  name: material
  logo: assets/logo_sm.png
  favicon: assets/logo_sm.png
  icon:
    repo: octicons/mark-github-16
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.instant
    - navigation.tabs
    - navigation.path
    - toc.follow

hooks:
  - hooks/skills_reference.py

plugins:
  - search

markdown_extensions:
  - mkdocs-click
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

repo_url: https://github.com/google/agents-cli
repo_name: google/agents-cli

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/persona.js
  - javascripts/lifecycle.js

nav:
  - Home: index.md
  - Guide:
    - Overview:
      - Getting Started: guide/getting-started.md
      - The Lifecycle: guide/lifecycle.md
      - "Tutorial: Build Your First Agent": guide/quickstart-tutorial.md
      - "Tutorial: Manual Workflow": guide/hands-on-tutorial.md
      - Use Cases: guide/use-cases.md
      - Authentication: guide/authentication.md
    - Development:
      - Development Guide: guide/development.md
      - Project Structure: guide/project-structure.md
      - Agent Templates: guide/templates.md
    - Evaluation:
      - Evaluation Guide: guide/evaluation.md
    - Deployment & Operations:
      - Deployment: guide/deployment.md
      - "CI/CD & Production": guide/cicd.md
      - Observability:
        - Overview: guide/observability/index.md
        - Cloud Trace: guide/observability/cloud-trace.md
        - BigQuery Plugin: guide/observability/bq-agent-analytics.md
  - Reference:
    - reference/index.md
    - CLI: cli/index.md
    - Skills: reference/skills.md
    - About This Project: reference/about.md
    - From Agent Starter Pack: reference/from-agent-starter-pack.md
    - Migrating Eval Datasets: reference/eval-dataset-migration.md
