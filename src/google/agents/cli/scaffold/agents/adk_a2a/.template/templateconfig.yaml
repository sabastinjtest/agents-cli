description: "ReAct agent with A2A protocol [experimental]"
example_question: "What's the weather in San Francisco?"
settings:
  requires_data_ingestion: false
  deployment_targets: ["agent_runtime", "cloud_run", "gke", "none"]
  # The aiplatform 1.149.0 pin for Vertex Agent Runtime deploys lives in the
  # [tool.uv] override in base_templates/python/pyproject.toml, gated on the
  # agent_runtime target (b/514362507, go/orcas-rfc-803).
  extra_dependencies: ["google-adk[gcp]>=2.0.0,<3.0.0", "a2a-sdk[http-server]~=0.3.22", "nest-asyncio>=1.6.0,<2.0.0"]
  tags: ["adk", "a2a"]
  frontend_type: "None"