steps:
{%- if cookiecutter.data_ingestion and cookiecutter.datastore_type == "agent_platform_vector_search" %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-data-ingestion-pipeline-prod
    entrypoint: /bin/bash
    args:
      - -c
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        cd data_ingestion/data_ingestion_pipeline && \
        uv sync --locked && uv run python submit_pipeline.py
    env:
      - "PIPELINE_ROOT=${_PIPELINE_GCS_ROOT_PROD}"
      - "REGION=${_REGION}"
      - "VECTOR_SEARCH_COLLECTION_ID=${_VECTOR_SEARCH_COLLECTION_ID}"
      - "VECTOR_SEARCH_LOCATION=${_VECTOR_SEARCH_LOCATION}"
      - "PROJECT_ID=${_PROD_PROJECT_ID}"
      - "SERVICE_ACCOUNT=${_PIPELINE_SA_EMAIL_PROD}"
      - "PIPELINE_NAME=${_PIPELINE_NAME}"
      - "CRON_SCHEDULE=${_PIPELINE_CRON_SCHEDULE}"
      - "DISABLE_CACHING=TRUE"
      - "SCHEDULE_ONLY=TRUE"
{%- endif %}
{%- if cookiecutter.deployment_target == 'cloud_run' %}

  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        docker build \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --build-arg COMMIT_SHA=$COMMIT_SHA \
          .
        docker push $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_PROD_PROJECT_ID} \
          --region ${_REGION} \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

{%- elif cookiecutter.deployment_target == 'gke' %}
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        docker build \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --build-arg COMMIT_SHA=$COMMIT_SHA \
          .
        docker push $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  # Deploy to Production GKE
  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_PROD_PROJECT_ID} \
          --region ${_REGION} \
          --cluster-name ${_GKE_CLUSTER_NAME} \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA
{%- elif cookiecutter.deployment_target == 'agent_runtime' %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --locked

  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_PROD_PROJECT_ID} \
          --region ${_REGION} \
          --service-account=${_APP_SERVICE_ACCOUNT_PROD} \
          --update-env-vars="COMMIT_SHA=${COMMIT_SHA},LOGS_BUCKET_NAME=${_LOGS_BUCKET_NAME_PROD}{%- if cookiecutter.data_ingestion %}{%- if cookiecutter.datastore_type == "agent_platform_search" %},DATA_STORE_ID=${_DATA_STORE_ID_PROD},DATA_STORE_REGION=${_DATA_STORE_REGION}{%- elif cookiecutter.datastore_type == "agent_platform_vector_search" %},VECTOR_SEARCH_COLLECTION_ID=${_VECTOR_SEARCH_COLLECTION_ID},VECTOR_SEARCH_LOCATION=${_VECTOR_SEARCH_LOCATION}{%- endif %}{%- endif %}"
{%- endif %}

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-east1

logsBucket: gs://${PROJECT_ID}-{{ cookiecutter.project_name | replace('_', '-') }}-logs/build-logs
options:
  env:
    - 'UV_PYTHON=3.12'
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
