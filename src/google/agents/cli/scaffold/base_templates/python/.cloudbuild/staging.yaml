steps:
{%- if cookiecutter.data_ingestion and cookiecutter.datastore_type == "agent_platform_vector_search" %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-data-ingestion-pipeline-staging
    entrypoint: /bin/bash
    args:
      - -c
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        cd data_ingestion/data_ingestion_pipeline && \
        uv sync --locked && uv run python submit_pipeline.py
    env:
      - "PIPELINE_ROOT=${_PIPELINE_GCS_ROOT_STAGING}"
      - "REGION=${_REGION}"
      - "VECTOR_SEARCH_COLLECTION_ID=${_VECTOR_SEARCH_COLLECTION_ID}"
      - "VECTOR_SEARCH_LOCATION=${_VECTOR_SEARCH_LOCATION}"
      - "PROJECT_ID=${_STAGING_PROJECT_ID}"
      - "SERVICE_ACCOUNT=${_PIPELINE_SA_EMAIL_STAGING}"
      - "PIPELINE_NAME=${_PIPELINE_NAME}"
{%- endif %}
{%- if cookiecutter.deployment_target == 'cloud_run' %}

  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        docker build \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --build-arg COMMIT_SHA=$COMMIT_SHA \
          .
        docker push $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_STAGING_PROJECT_ID} \
          --region ${_REGION} \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  # Fetch Staging Service URL
  - name: "gcr.io/cloud-builders/gcloud"
    id: fetch-staging-url
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo $(gcloud run services describe {{cookiecutter.project_name}} \
        --region ${_REGION} --project ${_STAGING_PROJECT_ID} --format="value(status.url)") > staging_url.txt

  # Fetch ID Token
  - name: gcr.io/cloud-builders/gcloud
    id: fetch-id-token
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo $(gcloud auth print-identity-token -q) > id_token.txt
{%- elif cookiecutter.deployment_target == 'gke' %}
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        docker build \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA \
          --build-arg COMMIT_SHA=$COMMIT_SHA \
          .
        docker push $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  # Deploy to Staging GKE
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_STAGING_PROJECT_ID} \
          --region ${_REGION} \
          --cluster-name ${_GKE_CLUSTER_NAME} \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA

  # Get GKE credentials for port-forward
  - name: "gcr.io/cloud-builders/gcloud"
    id: get-gke-credentials
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials ${_GKE_CLUSTER_NAME} --region ${_REGION} --project ${_STAGING_PROJECT_ID}
{%- elif cookiecutter.deployment_target == 'agent_runtime' %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --locked

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
{%- if cookiecutter.wheel_gcs_uri %}
        gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
        uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
        uvx google-agents-cli deploy \
{%- endif %}
          --project ${_STAGING_PROJECT_ID} \
          --region ${_REGION} \
          --service-account=${_APP_SERVICE_ACCOUNT_STAGING} \
          --update-env-vars="COMMIT_SHA=${COMMIT_SHA},LOGS_BUCKET_NAME=${_LOGS_BUCKET_NAME_STAGING}{%- if cookiecutter.data_ingestion %}{%- if cookiecutter.datastore_type == "agent_platform_search" %},DATA_STORE_ID=${_DATA_STORE_ID_STAGING},DATA_STORE_REGION=${_DATA_STORE_REGION}{%- elif cookiecutter.datastore_type == "agent_platform_vector_search" %},VECTOR_SEARCH_COLLECTION_ID=${_VECTOR_SEARCH_COLLECTION_ID},VECTOR_SEARCH_LOCATION=${_VECTOR_SEARCH_LOCATION}{%- endif %}{%- endif %}"


  - name: gcr.io/cloud-builders/gcloud
    id: fetch-auth-token
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo $(gcloud auth print-access-token -q) > auth_token.txt
{%- endif %}

{%- if cookiecutter.deployment_target == 'cloud_run' %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        export _ID_TOKEN=$(cat id_token.txt)
        export _STAGING_URL=$(cat staging_url.txt)
        uvx{%- if cookiecutter.is_a2a %} --with "a2a-sdk~=0.3.22"{%- endif %} locust==2.31.1 \
        -f tests/load_test/load_test.py \
        --headless \
        -H $$_STAGING_URL \
        -t 30s -u 10 -r 0.5 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
{%- elif cookiecutter.deployment_target == 'gke' %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        kubectl port-forward svc/{{cookiecutter.project_name}} 8080:8080 -n {{cookiecutter.project_name}} &
        PF_PID=$$!
        sleep 5
        uvx{%- if cookiecutter.is_a2a %} --with "a2a-sdk~=0.3.22"{%- endif %} locust==2.31.1 \
        -f tests/load_test/load_test.py \
        --headless \
        -H http://127.0.0.1:8080 \
        -t 30s -u 10 -r 0.5 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
        _LOAD_TEST_EXIT_CODE=$$?
        kill $$PF_PID || true
        exit $$_LOAD_TEST_EXIT_CODE
{%- elif cookiecutter.deployment_target == 'agent_runtime' %}
  - name: "gcr.io/cloud-builders/gcloud"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        export _AUTH_TOKEN=$(cat auth_token.txt)
        uvx locust==2.31.1 \
        -f tests/load_test/load_test.py \
        --headless \
        -t 30s -u 2 -r 0.5 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
{%- endif %}

  # Export Load Test Results to GCS
  - name: gcr.io/cloud-builders/gcloud
    id: export-results-to-gcs
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        gsutil -m cp -r tests/load_test/.results gs://${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}
        echo "_________________________________________________________________________"
        echo "Load test results copied to gs://${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}"
        echo "HTTP link: https://console.cloud.google.com/storage/browser/${_LOGS_BUCKET_NAME_STAGING}/load-test-results/results-$${_TIMESTAMP}"
        echo "_________________________________________________________________________"

  # Trigger Prod Deployment
  - name: gcr.io/cloud-builders/gcloud
    id: trigger-prod-deployment
    entrypoint: gcloud
    args:
      - "beta"
      - "builds"
      - "triggers"
      - "run"
      - "deploy-{{cookiecutter.project_name}}"
      - "--region"
      - "$LOCATION"
      - "--project"
      - "$PROJECT_ID"
      - "--sha"
      - $COMMIT_SHA

  - name: gcr.io/cloud-builders/gcloud
    id: echo-view-build-trigger-link
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo "_________________________________________________________________________"
        echo "Production deployment triggered. View progress and / or approve on the Cloud Build Console:"
        echo "https://console.cloud.google.com/cloud-build/builds;region=$LOCATION"
        echo "_________________________________________________________________________"

substitutions:
  _STAGING_PROJECT_ID: YOUR_STAGING_PROJECT_ID
  _REGION: us-east1

logsBucket: gs://${PROJECT_ID}-{{ cookiecutter.project_name | replace('_', '-') }}-logs/build-logs
options:
  env:
    - 'UV_PYTHON=3.12'
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
