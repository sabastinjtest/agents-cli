name: Deploy to Production

on:
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This job targets the 'production' environment, which is automatically
    # created by the Terraform setup in `deployment/terraform/cicd/github.tf`.
    # To enable manual approval for deployments, you must add a protection
    # rule to this environment in your GitHub repository settings.
    #
    # 1. Go to your repository's Settings > Environments.
    # 2. Select the 'production' environment.
    # 3. Under 'Protection rules', check the 'Required reviewers' box.
    # 4. Add the specific users or teams who must approve the deployment.
    #
    # Once configured, the workflow will pause at this step and wait for an
    # authorized user to approve it before proceeding.
    environment:
      name: production
    concurrency: production
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/{% raw %}${{ vars.GCP_PROJECT_NUMBER }}{% endraw %}/locations/global/workloadIdentityPools/{% raw %}${{ secrets.WIF_POOL_ID }}{% endraw %}/providers/{% raw %}${{ secrets.WIF_PROVIDER_ID }}{% endraw %}'
          service_account: '{% raw %}${{ secrets.GCP_SERVICE_ACCOUNT }}{% endraw %}'
          create_credentials_file: true
          project_id: {% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}


      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

{%- if cookiecutter.deployment_target == 'agent_runtime' %}
      - name: Install dependencies
        run: uv sync --locked
{%- endif %}

{%- if cookiecutter.data_ingestion and cookiecutter.datastore_type == "agent_platform_vector_search" %}
      - name: Deploy data ingestion pipeline (Production)
        run: |
          cd data_ingestion/data_ingestion_pipeline && \
          uv sync --locked && uv run python submit_pipeline.py
        env:
          PIPELINE_ROOT: {% raw %}${{ vars.PIPELINE_GCS_ROOT_PROD }}{% endraw %}
          REGION: {% raw %}${{ vars.REGION }}{% endraw %}
          VECTOR_SEARCH_COLLECTION_ID: {% raw %}${{ vars.VECTOR_SEARCH_COLLECTION_ID }}{% endraw %}
          VECTOR_SEARCH_LOCATION: {% raw %}${{ vars.VECTOR_SEARCH_LOCATION }}{% endraw %}
          PROJECT_ID: {% raw %}${{ vars.PROD_PROJECT_ID }}{% endraw %}
          SERVICE_ACCOUNT: {% raw %}${{ vars.PIPELINE_SA_EMAIL_PROD }}{% endraw %}
          PIPELINE_NAME: {% raw %}${{ vars.PIPELINE_NAME }}{% endraw %}
          CRON_SCHEDULE: {% raw %}${{ vars.PIPELINE_CRON_SCHEDULE }}{% endraw %}
          DISABLE_CACHING: "TRUE"
          SCHEDULE_ONLY: "TRUE"
{%- endif %}

{%- if cookiecutter.deployment_target == 'cloud_run' %}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %} \
            --build-arg COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %} \
            .
          docker push {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Deploy to Production (Cloud Run)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.PROD_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --image {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

{%- elif cookiecutter.deployment_target == 'gke' %}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %} \
            --build-arg COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %} \
            .
          docker push {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Deploy to GKE (Production)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.PROD_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --cluster-name {% raw %}${{ vars.GKE_CLUSTER_NAME_PROD }}{% endraw %} \
            --image {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

{%- elif cookiecutter.deployment_target == 'agent_runtime' %}

      - name: Deploy to Production (Agent Runtime)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.PROD_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --service-account={% raw %}${{ vars.APP_SERVICE_ACCOUNT_PROD }}{% endraw %} \
            --update-env-vars="COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %},LOGS_BUCKET_NAME={% raw %}${{ vars.LOGS_BUCKET_NAME_PROD }}{% endraw %}{%- if cookiecutter.data_ingestion %}{%- if cookiecutter.datastore_type == "agent_platform_search" %},DATA_STORE_ID={% raw %}${{ vars.DATA_STORE_ID_PROD }}{% endraw %},DATA_STORE_REGION={% raw %}${{ vars.DATA_STORE_REGION }}{% endraw %}{%- elif cookiecutter.datastore_type == "agent_platform_vector_search" %},VECTOR_SEARCH_COLLECTION_ID={% raw %}${{ vars.VECTOR_SEARCH_COLLECTION_ID }}{% endraw %},VECTOR_SEARCH_LOCATION={% raw %}${{ vars.VECTOR_SEARCH_LOCATION }}{% endraw %}{%- endif %}{%- endif %}"
{%- endif %}

