name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths:
      - '{{cookiecutter.agent_directory}}/**'
      - 'data_ingestion/**'
      - 'tests/**'
      - 'deployment/**'
      - 'uv.lock'

jobs:
  deploy_and_test_staging:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/{% raw %}${{ vars.GCP_PROJECT_NUMBER }}{% endraw %}/locations/global/workloadIdentityPools/{% raw %}${{ secrets.WIF_POOL_ID }}{% endraw %}/providers/{% raw %}${{ secrets.WIF_PROVIDER_ID }}{% endraw %}'
          service_account: '{% raw %}${{ secrets.GCP_SERVICE_ACCOUNT }}{% endraw %}'
          create_credentials_file: true
          project_id: {% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'
{%- if cookiecutter.data_ingestion and cookiecutter.datastore_type == "agent_platform_vector_search" %}

      - name: Deploy data ingestion pipeline (Staging)
        run: |
          cd data_ingestion/data_ingestion_pipeline && \
          uv sync --locked && uv run python submit_pipeline.py
        env:
          PIPELINE_ROOT: {% raw %}${{ vars.PIPELINE_GCS_ROOT_STAGING }}{% endraw %}
          REGION: {% raw %}${{ vars.REGION }}{% endraw %}
          VECTOR_SEARCH_COLLECTION_ID: {% raw %}${{ vars.VECTOR_SEARCH_COLLECTION_ID }}{% endraw %}
          VECTOR_SEARCH_LOCATION: {% raw %}${{ vars.VECTOR_SEARCH_LOCATION }}{% endraw %}
          PROJECT_ID: {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %}
          SERVICE_ACCOUNT: {% raw %}${{ vars.PIPELINE_SA_EMAIL_STAGING }}{% endraw %}
          PIPELINE_NAME: {% raw %}${{ vars.PIPELINE_NAME }}{% endraw %}
{%- endif %}

{%- if cookiecutter.deployment_target == 'cloud_run' %}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %} \
            --build-arg COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %} \
            .
          docker push {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Deploy to Staging (Cloud Run)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --image {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Fetch Staging Service URL
        id: fetch-url
        run: |
          _STAGING_URL=$(gcloud run services describe {{cookiecutter.project_name}} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} --project {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %} --format="value(status.url)")
          echo "_staging_url=${_STAGING_URL}" >> $GITHUB_OUTPUT

      - name: Fetch ID Token
        id: fetch-token
        run: |
          _ID_TOKEN=$(gcloud auth print-identity-token --impersonate-service-account={% raw %}${{ secrets.GCP_SERVICE_ACCOUNT }}{% endraw %} -q)
          echo "::add-mask::${_ID_TOKEN}"
          echo "_id_token=${_ID_TOKEN}" >> $GITHUB_OUTPUT

{%- elif cookiecutter.deployment_target == 'gke' %}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %} \
            --build-arg COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %} \
            .
          docker push {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Deploy to GKE (Staging)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --cluster-name {% raw %}${{ vars.GKE_CLUSTER_NAME_STAGING }}{% endraw %} \
            --image {% raw %}${{ vars.REGION }}{% endraw %}-docker.pkg.dev/{% raw %}${{ vars.CICD_PROJECT_ID }}{% endraw %}/{% raw %}${{ vars.ARTIFACT_REGISTRY_REPO_NAME }}{% endraw %}/{% raw %}${{ vars.CONTAINER_NAME }}{% endraw %}:{% raw %}${{ github.sha }}{% endraw %}

      - name: Get GKE Credentials
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: {% raw %}${{ vars.GKE_CLUSTER_NAME_STAGING }}{% endraw %}
          location: {% raw %}${{ vars.REGION }}{% endraw %}
          project_id: {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %}

      - name: Start port-forward to GKE service
        id: port-forward
        run: |
          kubectl port-forward svc/{{cookiecutter.project_name}} 8080:8080 -n {{cookiecutter.project_name}} &
          echo "pf_pid=$!" >> $GITHUB_OUTPUT
          sleep 5

{%- elif cookiecutter.deployment_target == 'agent_runtime' %}

      - name: Install dependencies
        run: uv sync --locked

      - name: Deploy to Staging (Agent Runtime)
        run: |
{%- if cookiecutter.wheel_gcs_uri %}
          gsutil cp {{ cookiecutter.wheel_gcs_uri }} /tmp/
          uvx --from /tmp/{{ cookiecutter.wheel_gcs_uri.split('/')[-1] }} google-agents-cli deploy \
{%- else %}
          uvx google-agents-cli deploy \
{%- endif %}
            --project {% raw %}${{ vars.STAGING_PROJECT_ID }}{% endraw %} \
            --region {% raw %}${{ vars.REGION }}{% endraw %} \
            --service-account={% raw %}${{ vars.APP_SERVICE_ACCOUNT_STAGING }}{% endraw %} \
            --update-env-vars="COMMIT_SHA={% raw %}${{ github.sha }}{% endraw %},LOGS_BUCKET_NAME={% raw %}${{ vars.LOGS_BUCKET_NAME_STAGING }}{% endraw %}{%- if cookiecutter.data_ingestion %}{%- if cookiecutter.datastore_type == "agent_platform_search" %},DATA_STORE_ID={% raw %}${{ vars.DATA_STORE_ID_STAGING }}{% endraw %},DATA_STORE_REGION={% raw %}${{ vars.DATA_STORE_REGION }}{% endraw %}{%- elif cookiecutter.datastore_type == "agent_platform_vector_search" %},VECTOR_SEARCH_COLLECTION_ID={% raw %}${{ vars.VECTOR_SEARCH_COLLECTION_ID }}{% endraw %},VECTOR_SEARCH_LOCATION={% raw %}${{ vars.VECTOR_SEARCH_LOCATION }}{% endraw %}{%- endif %}{%- endif %}"

      - name: Fetch Auth Token
        id: fetch-token
        run: |
          _AUTH_TOKEN=$(gcloud auth print-access-token -q)
          echo "::add-mask::${_AUTH_TOKEN}"
          echo "_auth_token=${_AUTH_TOKEN}" >> $GITHUB_OUTPUT
{%- endif %}

      - name: Run load test
        run: |
{%- if cookiecutter.deployment_target == 'cloud_run' %}
          export _ID_TOKEN="{% raw %}${{ steps.fetch-token.outputs._id_token }}{% endraw %}"
          export _STAGING_URL="{% raw %}${{ steps.fetch-url.outputs._staging_url }}{% endraw %}"
          uvx{%- if cookiecutter.is_a2a %} --with "a2a-sdk~=0.3.22"{%- endif %} locust==2.31.1 \
          -f tests/load_test/load_test.py \
          --headless \
          -H ${_STAGING_URL} \
          -t 30s -u 10 -r 0.5 \
          --csv=tests/load_test/.results/results \
          --html=tests/load_test/.results/report.html
{%- elif cookiecutter.deployment_target == 'gke' %}
          uvx{%- if cookiecutter.is_a2a %} --with "a2a-sdk~=0.3.22"{%- endif %} locust==2.31.1 \
          -f tests/load_test/load_test.py \
          --headless \
          -H http://127.0.0.1:8080 \
          -t 30s -u 10 -r 0.5 \
          --csv=tests/load_test/.results/results \
          --html=tests/load_test/.results/report.html
          LOCUST_EXIT_CODE=$?
          kill {% raw %}${{ steps.port-forward.outputs.pf_pid }}{% endraw %} || true
          if [ $LOCUST_EXIT_CODE -ne 0 ]; then
            echo "Load test failed with exit code $LOCUST_EXIT_CODE"
            exit $LOCUST_EXIT_CODE
          fi
{%- elif cookiecutter.deployment_target == 'agent_runtime' %}
          export _AUTH_TOKEN="{% raw %}${{ steps.fetch-token.outputs._auth_token }}{% endraw %}"
          uvx locust==2.31.1 \
          -f tests/load_test/load_test.py \
          --headless \
          -t 30s -u 2 -r 0.5 \
          --csv=tests/load_test/.results/results \
          --html=tests/load_test/.results/report.html
{%- endif %}

      - name: Export Load Test Results to GCS
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          gcloud storage cp --recursive tests/load_test/.results gs://{% raw %}${{ vars.LOGS_BUCKET_NAME_STAGING }}{% endraw %}/load-test-results/results-${TIMESTAMP} --quiet
          echo "_________________________________________________________________________"
          echo "Load test results copied to gs://{% raw %}${{ vars.LOGS_BUCKET_NAME_STAGING }}{% endraw %}/load-test-results/results-${TIMESTAMP}"
          echo "HTTP link: https://console.cloud.google.com/storage/browser/{% raw %}${{ vars.LOGS_BUCKET_NAME_STAGING }}{% endraw %}/load-test-results/results-${TIMESTAMP}"
          echo "_________________________________________________________________________"

  call_production_workflow:
    needs: deploy_and_test_staging
    uses: ./.github/workflows/deploy-to-prod.yaml
    permissions:
      contents: 'read'
      id-token: 'write'
    secrets: inherit